name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release-notes.md
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          mkdir -p release
          platforms="linux/amd64 linux/arm64 darwin/arm64 windows/amd64 windows/arm64"
          targets=". ./connectors/rss/ ./connectors/imap/ ./connectors/github/ ./connectors/gitlab/ ./connectors/jira/ ./connectors/trello/ ./connectors/linkedin/ ./connectors/meta/ ./connectors/bluesky/ ./connectors/x/"

          for plat in $platforms; do
            GOOS="${plat%/*}"
            GOARCH="${plat#*/}"
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

            DIR="dist/${GOOS}-${GOARCH}"
            mkdir -p "$DIR"

            for target in $targets; do
              name=$(basename "$target")
              if [ "$name" = "." ]; then name="glovebox"; else name="${name}-connector"; fi
              echo "Building ${name} for ${GOOS}/${GOARCH}..."
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags="-s -w" -o "${DIR}/${name}${EXT}" "$target"
            done

            TAG="${{ steps.changelog.outputs.tag }}"
            case "$GOOS" in
              windows)
                (cd "$DIR" && zip -r "../../release/glovebox-${TAG}-${GOOS}-${GOARCH}.zip" .)
                ;;
              *)
                tar -czf "release/glovebox-${TAG}-${GOOS}-${GOARCH}.tar.gz" -C "$DIR" .
                ;;
            esac
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body_path: release-notes.md
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(steps.changelog.outputs.version, '-') }}
