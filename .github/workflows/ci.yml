name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  checks: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leftathome

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Test
        run: |
          go test ./... -count=1 -race -v 2>&1 | go-junit-report -set-exit-code > test-report.xml

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: 'Go Test Results'
          path: 'test-report.xml'
          reporter: 'java-junit'

      - name: Test Summary
        if: always()
        run: |
          if [ -f test-report.xml ]; then
            TESTS=$(grep -c '<testcase' test-report.xml 2>/dev/null || true)
            FAILURES=$(grep -c '<failure' test-report.xml 2>/dev/null || true)
            SKIPPED=$(grep -c '<skipped' test-report.xml 2>/dev/null || true)
            TESTS=${TESTS:-0}
            FAILURES=${FAILURES:-0}
            SKIPPED=${SKIPPED:-0}
            PASSED=$((TESTS - FAILURES - SKIPPED))
            echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Passed | ${PASSED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failed | ${FAILURES} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Skipped | ${SKIPPED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total** | **${TESTS}** |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test report found." >> "$GITHUB_STEP_SUMMARY"
          fi

  build-binaries:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build glovebox
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o glovebox${{ matrix.ext || '' }} .

      - name: Build rss-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o rss-connector${{ matrix.ext || '' }} ./connectors/rss/

      - name: Build imap-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o imap-connector${{ matrix.ext || '' }} ./connectors/imap/

      - name: Build github-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o github-connector${{ matrix.ext || '' }} ./connectors/github/

      - name: Build gitlab-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o gitlab-connector${{ matrix.ext || '' }} ./connectors/gitlab/

      - name: Build jira-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o jira-connector${{ matrix.ext || '' }} ./connectors/jira/

      - name: Build trello-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o trello-connector${{ matrix.ext || '' }} ./connectors/trello/

      - name: Build linkedin-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o linkedin-connector${{ matrix.ext || '' }} ./connectors/linkedin/

      - name: Build meta-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o meta-connector${{ matrix.ext || '' }} ./connectors/meta/

      - name: Build bluesky-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bluesky-connector${{ matrix.ext || '' }} ./connectors/bluesky/

      - name: Build x-connector
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o x-connector${{ matrix.ext || '' }} ./connectors/x/

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ matrix.goos }}-${{ matrix.goarch }}.spdx.json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            glovebox${{ matrix.ext }}
            rss-connector${{ matrix.ext }}
            imap-connector${{ matrix.ext }}
            github-connector${{ matrix.ext }}
            gitlab-connector${{ matrix.ext }}
            jira-connector${{ matrix.ext }}
            trello-connector${{ matrix.ext }}
            linkedin-connector${{ matrix.ext }}
            meta-connector${{ matrix.ext }}
            bluesky-connector${{ matrix.ext }}
            x-connector${{ matrix.ext }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            glovebox${{ matrix.ext || '' }}
            *-connector${{ matrix.ext || '' }}
            sbom.spdx.json

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -- glovebox --
      - name: Docker meta for glovebox
        id: meta-glovebox
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push glovebox
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-glovebox.outputs.tags }}
          labels: ${{ steps.meta-glovebox.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- rss-connector --
      - name: Docker meta for rss-connector
        id: meta-rss
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-rss
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push rss-connector
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./connectors/rss/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-rss.outputs.tags }}
          labels: ${{ steps.meta-rss.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- imap-connector --
      - name: Docker meta for imap-connector
        id: meta-imap
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-imap
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push imap-connector
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./connectors/imap/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-imap.outputs.tags }}
          labels: ${{ steps.meta-imap.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- github-connector --
      - name: Docker meta for github-connector
        id: meta-github
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-github
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push github-connector
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./connectors/github/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-github.outputs.tags }}
          labels: ${{ steps.meta-github.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- gitlab-connector --
      - name: Docker meta for gitlab-connector
        id: meta-gitlab
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-gitlab
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push gitlab-connector
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./connectors/gitlab/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-gitlab.outputs.tags }}
          labels: ${{ steps.meta-gitlab.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- jira-connector --
      - name: Docker meta for jira-connector
        id: meta-jira
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-jira
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push jira-connector
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./connectors/jira/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-jira.outputs.tags }}
          labels: ${{ steps.meta-jira.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- trello-connector --
      - name: Docker meta for trello-connector
        id: meta-trello
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-trello
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push trello-connector
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./connectors/trello/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-trello.outputs.tags }}
          labels: ${{ steps.meta-trello.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- linkedin-connector --
      - name: Docker meta for linkedin-connector
        id: meta-linkedin
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-linkedin
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push linkedin-connector
        uses: docker/build-push-action@v7
        with:
          context: .
