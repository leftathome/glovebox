          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -- meta-connector --
      - name: Docker meta for meta-connector
        id: meta-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/glovebox-meta
