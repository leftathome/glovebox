name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  checks: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/leftathome

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Test
        run: |
          go test ./... -count=1 -race -v 2>&1 | go-junit-report -set-exit-code > test-report.xml

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: 'Go Test Results'
          path: 'test-report.xml'
          reporter: 'java-junit'

      - name: Test Summary
        if: always()
        run: |
          if [ -f test-report.xml ]; then
            TESTS=$(grep -c '<testcase' test-report.xml 2>/dev/null || true)
            FAILURES=$(grep -c '<failure' test-report.xml 2>/dev/null || true)
            SKIPPED=$(grep -c '<skipped' test-report.xml 2>/dev/null || true)
            TESTS=${TESTS:-0}
            FAILURES=${FAILURES:-0}
            SKIPPED=${SKIPPED:-0}
            PASSED=$((TESTS - FAILURES - SKIPPED))
            echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Passed | ${PASSED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Failed | ${FAILURES} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Skipped | ${SKIPPED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total** | **${TESTS}** |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No test report found." >> "$GITHUB_STEP_SUMMARY"
          fi

  build-binaries:
    name: Build binaries (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build all binaries
        run: |
          for target in . ./connectors/rss/ ./connectors/imap/ ./connectors/github/ ./connectors/gitlab/ ./connectors/jira/ ./connectors/trello/ ./connectors/linkedin/ ./connectors/meta/ ./connectors/bluesky/ ./connectors/x/; do
            name=$(basename "$target")
            if [ "$name" = "." ]; then name="glovebox"; else name="${name}-connector"; fi
            echo "Building $name..."
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "${name}${{ matrix.ext || '' }}" "$target"
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-${{ matrix.goos }}-${{ matrix.goarch }}.spdx.json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            glovebox${{ matrix.ext }}
            *-connector${{ matrix.ext }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            glovebox${{ matrix.ext || '' }}
            *-connector${{ matrix.ext || '' }}
            sbom.spdx.json

  build-docker:
    name: Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: glovebox
            dockerfile: ./Dockerfile
            context: .
          - image: glovebox-rss
            dockerfile: ./connectors/rss/Dockerfile
            context: .
          - image: glovebox-imap
            dockerfile: ./connectors/imap/Dockerfile
            context: .
          - image: glovebox-github
            dockerfile: ./connectors/github/Dockerfile
            context: .
          - image: glovebox-gitlab
            dockerfile: ./connectors/gitlab/Dockerfile
            context: .
          - image: glovebox-jira
            dockerfile: ./connectors/jira/Dockerfile
            context: .
          - image: glovebox-trello
            dockerfile: ./connectors/trello/Dockerfile
            context: .
          - image: glovebox-linkedin
            dockerfile: ./connectors/linkedin/Dockerfile
            context: .
          - image: glovebox-meta
            dockerfile: ./connectors/meta/Dockerfile
            context: .
          - image: glovebox-bluesky
            dockerfile: ./connectors/bluesky/Dockerfile
            context: .
          - image: glovebox-x
            dockerfile: ./connectors/x/Dockerfile
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  helm:
    name: Package and push Helm chart
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: helm package charts/glovebox

      - name: Push Helm chart to GHCR
        run: |
          helm push glovebox-*.tgz oci://${{ env.IMAGE_PREFIX }}/charts

  security:
    name: Security scanning
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
