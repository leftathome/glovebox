{{- if .Values.metrics.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "glovebox.fullname" . }}
  labels:
    {{- include "glovebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanner
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "glovebox.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      path: /metrics
---
{{- range $name, $connector := .Values.connectors }}
{{- if $connector.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "glovebox.fullname" $ }}-{{ $name }}
  labels:
    {{- include "glovebox.labels" $ | nindent 4 }}
    app.kubernetes.io/component: connector
    glovebox.io/connector: {{ $name }}
    {{- with $.Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "glovebox.name" $ }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: connector
      glovebox.io/connector: {{ $name }}
  endpoints:
    - port: health
      interval: {{ $.Values.metrics.serviceMonitor.interval }}
      path: /metrics
---
{{- end }}
{{- end }}
{{- end }}
