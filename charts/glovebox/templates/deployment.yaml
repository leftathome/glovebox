apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-glovebox
  labels:
    app: glovebox
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: glovebox
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: glovebox
        release: {{ .Release.Name }}
      {{- if .Values.metrics.annotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      containers:
        - name: glovebox
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/glovebox/config.json
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/glovebox
              readOnly: true
            - name: staging
              mountPath: {{ .Values.config.stagingDir }}
            - name: quarantine
              mountPath: {{ .Values.config.quarantineDir }}
            - name: audit
              mountPath: {{ .Values.config.auditDir }}
            - name: failed
              mountPath: {{ .Values.config.failedDir }}
            - name: agents
              mountPath: {{ .Values.config.agentsDir }}
            - name: shared
              mountPath: {{ .Values.config.sharedDir }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-glovebox-config
        - name: staging
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.staging.existingClaim | default (printf "%s-glovebox-staging" .Release.Name) }}
        - name: quarantine
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.quarantine.existingClaim | default (printf "%s-glovebox-quarantine" .Release.Name) }}
        - name: audit
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.audit.existingClaim | default (printf "%s-glovebox-audit" .Release.Name) }}
        - name: failed
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.failed.existingClaim | default (printf "%s-glovebox-failed" .Release.Name) }}
        - name: agents
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.agents.existingClaim | default (printf "%s-glovebox-agents" .Release.Name) }}
        - name: shared
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.shared.existingClaim | default (printf "%s-glovebox-shared" .Release.Name) }}
