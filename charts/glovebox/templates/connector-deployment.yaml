{{- range $name, $connector := .Values.connectors }}
{{- if $connector.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "glovebox.fullname" $ }}-{{ $name }}
  labels:
    {{- include "glovebox.labels" $ | nindent 4 }}
    app.kubernetes.io/component: connector
    glovebox.io/connector: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "glovebox.name" $ }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: connector
      glovebox.io/connector: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "glovebox.name" $ }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: connector
        glovebox.io/connector: {{ $name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/connector-configmap.yaml") $ | sha256sum }}
        {{- if $.Values.metrics.annotations }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      serviceAccountName: {{ include "glovebox.serviceAccountName" $ }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: {{ $name }}
          image: "{{ $connector.image.repository }}:{{ $connector.image.tag }}"
          imagePullPolicy: {{ $connector.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GLOVEBOX_STAGING_DIR
              value: /data/glovebox/staging
            - name: GLOVEBOX_STATE_DIR
              value: /state
            - name: GLOVEBOX_CONNECTOR_CONFIG
              value: /etc/connector/config.json
            {{- range $key, $value := $connector.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if $connector.secrets }}
          envFrom:
            - secretRef:
                name: {{ $connector.secrets }}
          {{- end }}
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $connector.resources | nindent 12 }}
          volumeMounts:
            - name: staging
              mountPath: /data/glovebox/staging
            - name: state
              mountPath: /state
            - name: config
              mountPath: /etc/connector
              readOnly: true
      {{- with ($connector.nodeSelector | default $.Values.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($connector.affinity | default $.Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with ($connector.tolerations | default $.Values.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: staging
          persistentVolumeClaim:
            claimName: {{ $.Values.persistence.staging.existingClaim | default (printf "%s-staging" (include "glovebox.fullname" $)) }}
        - name: state
          persistentVolumeClaim:
            claimName: {{ $connector.state.existingClaim | default (printf "%s-%s-state" (include "glovebox.fullname" $) $name) }}
        - name: config
          configMap:
            name: {{ include "glovebox.fullname" $ }}-{{ $name }}-config
{{- end }}
{{- end }}
