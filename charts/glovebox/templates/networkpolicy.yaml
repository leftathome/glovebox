{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-glovebox
  labels:
    app: glovebox
    release: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: glovebox
      release: {{ .Release.Name }}
  policyTypes:
    - Egress
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
  egress: []
{{- end }}
