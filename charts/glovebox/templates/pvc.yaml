{{- $fullname := include "glovebox.fullname" . -}}
{{- range $name, $spec := dict "staging" .Values.persistence.staging "quarantine" .Values.persistence.quarantine "audit" .Values.persistence.audit "failed" .Values.persistence.failed "agents" .Values.persistence.agents "shared" .Values.persistence.shared }}
{{- if not $spec.existingClaim }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-{{ $name }}
  labels:
    {{- include "glovebox.labels" $ | nindent 4 }}
    app.kubernetes.io/component: scanner
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ $spec.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ $spec.size }}
  {{- if $spec.storageClass }}
  storageClassName: {{ $spec.storageClass | quote }}
  {{- end }}
{{- end }}
{{- end }}
