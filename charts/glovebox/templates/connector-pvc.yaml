{{- range $name, $connector := .Values.connectors }}
{{- if and $connector.enabled (not $connector.state.existingClaim) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "glovebox.fullname" $ }}-{{ $name }}-state
  labels:
    {{- include "glovebox.labels" $ | nindent 4 }}
    app.kubernetes.io/component: connector
    glovebox.io/connector: {{ $name }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $connector.state.size }}
  {{- if $connector.state.storageClass }}
  storageClassName: {{ $connector.state.storageClass | quote }}
  {{- end }}
{{- end }}
{{- end }}
