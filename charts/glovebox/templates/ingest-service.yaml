{{- if .Values.config.ingest.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "glovebox.fullname" . }}-ingest
  labels:
    {{- include "glovebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanner
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.config.ingest.port }}
      targetPort: ingest
      protocol: TCP
      name: ingest
  selector:
    {{- include "glovebox.selectorLabels" . | nindent 4 }}
{{- end }}
