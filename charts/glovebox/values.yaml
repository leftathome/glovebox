nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/leftathome/glovebox
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
affinity: {}
tolerations: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

config:
  stagingDir: /data/glovebox/staging
  quarantineDir: /data/glovebox/quarantine
  auditDir: /data/glovebox/audit
  failedDir: /data/glovebox/failed
  agentsDir: /data/agents
  sharedDir: /data/shared
  metricsPort: 9090
  watchMode: fsnotify
  pollIntervalSeconds: 5
  scanWorkers: 4
  scanTimeoutSeconds: 30
  scanChunkSizeBytes: 262144
  agentAllowlist:
    - messaging
    - media
    - calendar
    - itinerary
  ingest:
    enabled: true
    port: 9091
    maxBodyBytes: 67108864
    maxMetadataBytes: 262144
    backpressureThreshold: 100
    requestTimeoutSeconds: 60

persistence:
  staging:
    size: 1Gi
    storageClass: ""
    existingClaim: ""
    accessMode: ReadWriteMany  # shared between scanner + connectors
  quarantine:
    size: 5Gi
    storageClass: ""
    existingClaim: ""
    accessMode: ReadWriteOnce
  audit:
    size: 10Gi
    storageClass: ""
    existingClaim: ""
    accessMode: ReadWriteOnce
  failed:
    size: 5Gi
    storageClass: ""
    existingClaim: ""
    accessMode: ReadWriteOnce
  agents:
    size: 5Gi
    storageClass: ""
    existingClaim: ""
    accessMode: ReadWriteOnce
  shared:
    size: 1Gi
    storageClass: ""
    existingClaim: ""
    accessMode: ReadWriteOnce

metrics:
  port: 9090
  servicePort: 9090
  annotations: true  # add prometheus.io/* annotations to all pods
  serviceMonitor:
    enabled: false    # create ServiceMonitor CRDs (requires prometheus-operator)
    interval: 30s
    labels: {}        # additional labels for ServiceMonitor (e.g., release: prometheus)

networkPolicy:
  enabled: true

connectors:
  rss:
    enabled: false
    image:
      repository: ghcr.io/leftathome/glovebox-rss
      tag: latest
      pullPolicy: IfNotPresent
    config: {}
    env: {}
    secrets: ""
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi
    state:
      size: 1Gi
      storageClass: ""
      existingClaim: ""
    nodeSelector: {}
    affinity: {}
    tolerations: []

